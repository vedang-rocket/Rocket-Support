rules:
  - id: next-public-service-role-key
    pattern-regex: "NEXT_PUBLIC_[A-Z_]*(SERVICE_ROLE|SECRET|PRIVATE_KEY|WEBHOOK_SECRET|JWT_SECRET)[A-Z_]*\\s*=\\s*.+"
    paths:
      include:
        - ".env"
        - ".env.local"
        - ".env.production"
        - ".env.development"
        - ".env.example"
        - ".env.sample"
    message: >
      ROCKET RULE 6: Never use NEXT_PUBLIC_ prefix on service role or secret keys.
      NEXT_PUBLIC_ variables are embedded in the browser bundle and exposed to all users.
      A leaked service_role key bypasses all Row Level Security policies.
    languages: [generic]
    severity: ERROR
    metadata:
      category: ENV
      rocket_rule: "6"
      fix_summary: "Remove NEXT_PUBLIC_ prefix from secret/service_role keys"

  - id: next-public-stripe-secret
    pattern-regex: "NEXT_PUBLIC_STRIPE_SECRET[A-Z_]*\\s*=\\s*.+"
    paths:
      include:
        - ".env"
        - ".env.local"
        - ".env.production"
        - ".env.development"
    message: >
      ROCKET RULE 6: Stripe secret key must NOT have NEXT_PUBLIC_ prefix.
      Use STRIPE_SECRET_KEY (server-only). Exposing this leaks full Stripe account access.
    languages: [generic]
    severity: ERROR
    metadata:
      category: ENV
      rocket_rule: "6"
